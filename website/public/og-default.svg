<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="WiFi Buddy  See your Wi-Fi. Walk your home. Find every dead zone.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A1A1F"/>
      <stop offset="1" stop-color="#28282C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0" r="0.8">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo tile -->
  <g transform="translate(96 175) scale(0.28)">
    <rect width="1000" height="1000" rx="220" fill="#28282C" stroke="#3A3A40"/>
    <path d="M185.36 379.36 A 445 445 0 0 1 814.64 379.36" stroke="#4DD966" stroke-width="80" stroke-linecap="round" fill="none"/>
    <path d="M272.27 466.27 A 315 315 0 0 1 727.73 466.27" stroke="#FAD138" stroke-width="80" stroke-linecap="round" fill="none"/>
    <path d="M364.18 558.18 A 185 185 0 0 1 635.82 558.18" stroke="#FA8538" stroke-width="80" stroke-linecap="round" fill="none"/>
    <circle cx="500" cy="695" r="55" fill="#FA5252"/>
  </g>

  <text x="420" y="240" fill="#FFFFFF" font-family="-apple-system, system-ui, sans-serif" font-size="64" font-weight="800" letter-spacing="-1.5">WiFi Buddy</text>
  <text x="420" y="320" fill="#C8CCD4" font-family="-apple-system, system-ui, sans-serif" font-size="32" font-weight="500">See your Wi-Fi. Walk your home.</text>
  <text x="420" y="362" fill="#C8CCD4" font-family="-apple-system, system-ui, sans-serif" font-size="32" font-weight="500">Find every dead zone.</text>

  <g transform="translate(420 440)">
    <rect width="240" height="56" rx="14" fill="#FFFFFF"/>
    <text x="32" y="36" fill="#000000" font-family="-apple-system, system-ui, sans-serif" font-size="20" font-weight="700">Download on the App Store</text>
  </g>
</svg>
